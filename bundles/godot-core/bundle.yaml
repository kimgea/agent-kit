includes:
  skills:
    - godot-task
    - godot-master
    - godot-gdscript-mastery
    - godot-project-foundations
    - godot-testing-patterns

entrypoint:
  default_skill: godot-task

on_demand_skills:
  - godot-save-load-systems
  - godot-shaders-basics
  - godot-signal-architecture
  - godot-ui-containers
  - godot-ui-theming

rules:
  - Start with the included skills.
  - Add on-demand skills only when the task or project clearly needs them.
  - Use godot-master as fallback reference, not as the default entrypoint.

